
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="w-full h-full">
                        <defs>
                            <linearGradient id="bgGrad-A0C4FF" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#A0C4FF" />
                                <stop offset="100%" stop-color="#C2E0FF" />
                            </linearGradient>
                            <linearGradient id="iconGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FFFFFF" />
                                <stop offset="100%" stop-color="#E2F0FF" />
                            </linearGradient>
                            <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
                                <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#4A3E3D" flood-opacity="0.12"/>
                            </filter>
                        </defs>

                        <!-- Icon Background Plate -->
                        <rect width="512" height="512" rx="115.2" fill="url(#bgGrad-A0C4FF)" />

                        <!-- Main Fusion Motif: Clock Arc + Clear Checkmark -->
                        <g filter="url(#softShadow)">
                            <!-- Clock Outer Minimal Ring -->
                            <path d="M 256 112 A 144 144 0 1 0 380 330" 
                                  fill="none" 
                                  stroke="#FFFFFF" 
                                  stroke-width="56" 
                                  stroke-linecap="round" 
                                  opacity="0.95"/>
                            
                            <!-- Tick Marks on Clock (Minimalist hours) -->
                            <circle cx="256" cy="112" r="10" fill="#FFFFFF" />
                            <circle cx="112" cy="256" r="10" fill="#FFFFFF" />
                            <circle cx="256" cy="400" r="10" fill="#FFFFFF" />

                            <!-- Integrated Checkmark Stroke morphing with clock hands -->
                            <path d="M 190 260 L 240 315 L 370 170" 
                                  fill="none" 
                                  stroke="#FFFFFF" 
                                  stroke-width="70" 
                                  stroke-linecap="round" 
                                  stroke-linejoin="round"/>
                        </g>

                        
                        <!-- Sparkle Highlights -->
                        <path d="M 380 130 L 388 145 L 403 153 L 388 161 L 380 176 L 372 161 L 357 153 L 372 145 Z" fill="#FFFFFF" opacity="0.9"/>
                        <path d="M 130 370 L 134 378 L 142 382 L 134 386 L 130 394 L 126 386 L 118 382 L 126 378 Z" fill="#FFFFFF" opacity="0.7"/>
                        
                    </svg>